# =============================================================================
# postgresql.conf — Parámetros requeridos para Debezium CDC
# =============================================================================

# Replicación lógica: OBLIGATORIO para Debezium
# logical = permite que herramientas externas lean el WAL decodificado
wal_level = logical

# Número máximo de slots de replicación activos
# Un slot por cada conector Debezium que tengas activo
max_replication_slots = 5

# Número máximo de procesos de WAL sender
max_wal_senders = 5

# Retener suficiente WAL para que Debezium pueda leerlo
# aunque esté un momento caído (1 GB por defecto es razonable)
# OJO en versiones superiores a 14 (en <= 14 son MB)
wal_keep_size = 1024