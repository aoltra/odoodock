# =============================================================================
# keycloak.yml — Infraestructura RabbitMQ para el procesamiento de datos con keycloak
# Vhost: keycloak
# =============================================================================

vhost: keycloak

users:
  - name: user_worker
    password: secret
    tags: management
    permissions:
      - vhost: keycloak
        configure: ".*"
        write: ".*"
        read: ".*"

queues:
  - name: dev.q.keycloak
    type: classic
    durable: true

  - name: dev.q.keycloak.failed
    type: classic
    durable: true
    
exchanges:
  - name: dev.ex.keycloak.events
    type: topic
    durable: true

# todos los mensajes del exchange dev.ex.keycloak.events a la misma cola
bindings:
  - exchange: dev.ex.keycloak.events
    queue: dev.q.keycloak
    routing_key: "#"
